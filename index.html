<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#020826" />
  <title>SGO – Acesso</title>

  <link rel="icon" type="image/x-icon" href="favicon.ico" />
  <link rel="icon" type="image/png" href="icon-512.png" />

  <style>
    :root {
      /* Padrão claro (equivalente ao gestor sem theme-dark) */
      --bg-body: #f3f4f6;
      --bg-card: #ffffff;
      --text-main: #111827;
      --text-secondary: #6b7280;
      --primary: #22c55e;
      --primary-soft: rgba(34,197,94,0.12);
      --border-subtle: #e5e7eb;
      --danger: #ef4444;
    }

    body.theme-dark {
      /* Mesmo padrão dark do gestor.html adaptado para login */
      --bg-body: #020826;
      --bg-card: #050b35;
      --text-main: #f9fafb;
      --text-secondary: #9ca3af;
      --primary: #22c55e;
      --primary-soft: rgba(34,197,94,0.16);
      --border-subtle: #1f2937;
      --danger: #ef4444;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
      background: radial-gradient(circle at top, #cbd5f5, #020617 58%);
      color: var(--text-main);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:16px;
      transition: background-color 0.2s ease, color 0.2s ease;
    }

    body.theme-dark {
      background: radial-gradient(circle at top, #1d283a, #020617 58%);
    }

    .card {
      position: relative;
      background: var(--bg-card);
      max-width: 420px;
      width:100%;
      border-radius: 18px;
      padding: 20px 18px 20px;
      border: 1px solid var(--border-subtle);
      box-shadow: 0 18px 40px rgba(15,23,42,0.25);
      text-align:center;
    }

    .theme-toggle {
      position:absolute;
      top:10px;
      right:10px;
      font-size: 13px;
      padding: 4px 9px;
      border-radius: 999px;
      border: 1px solid rgba(148,163,184,0.6);
      background: rgba(15,23,42,0.04);
      color: var(--text-secondary);
      display:flex;
      align-items:center;
      gap:6px;
      cursor:pointer;
    }

    body.theme-dark .theme-toggle {
      background: rgba(15,23,42,0.9);
      color:#e5e7eb;
    }

    .theme-toggle span.icon {
      font-size:15px;
    }

    .logo-wrapper {
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      margin-bottom:12px;
      margin-top:12px;
    }

    .logo-img {
      width:72px;
      height:72px;
      border-radius:16px;
      overflow:hidden;
      border:1px solid rgba(148,163,184,0.6);
      background:#020617;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .logo-img img {
      width:100%;
      height:100%;
      object-fit:cover;
    }

    h1 {
      margin:8px 0 0;
      font-size:22px;
    }

    .subtitle {
      font-size:13px;
      color:var(--text-secondary);
      margin-top:2px;
    }

    form {
      margin-top:14px;
      text-align:left;
    }

    label {
      display:block;
      font-size:12px;
      margin-top:10px;
      margin-bottom:4px;
      color:var(--text-secondary);
    }

    input {
      width:100%;
      padding: 9px 11px;
      border-radius:10px;
      border:1px solid rgba(148,163,184,0.5);
      background:#f9fafb;
      color:var(--text-main);
      font-size:14px;
    }

    body.theme-dark input {
      background:#020617;
      color:var(--text-main);
      border-color: rgba(148,163,184,0.6);
    }

    input::placeholder {
      color:var(--text-secondary);
    }

    button {
      font: inherit;
      border-radius: 999px;
      border: none;
      padding: 10px 14px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    button.primary {
      background: var(--primary);
      color: #022c22;
      font-weight: 600;
      width:100%;
      margin-top:14px;
    }

    button.secondary {
      background: rgba(148,163,184,0.12);
      color: var(--text-main);
      border: 1px solid rgba(148,163,184,0.4);
      width:100%;
      margin-top:6px;
    }

    button:disabled {
      opacity:0.6;
      cursor:not-allowed;
    }

    .small {
      font-size:12px;
      color:var(--text-secondary);
    }

    .error {
      font-size:12px;
      color:#fecaca;
      margin-top:6px;
      background:rgba(248,113,113,0.18);
      border-radius:10px;
      padding:6px 8px;
      border:1px solid rgba(248,113,113,0.5);
      text-align:left;
    }

    .success {
      font-size:12px;
      color:#bbf7d0;
      margin-top:6px;
      text-align:left;
    }

    .divider {
      height:1px;
      background:rgba(31,41,55,0.15);
      margin:12px 0;
    }

    body.theme-dark .divider {
      background:rgba(31,41,55,0.9);
    }

    .role-actions {
      margin-top:4px;
      text-align:left;
    }

    .role-actions h2 {
      font-size:14px;
      margin:0 0 6px;
    }

    .badge-role {
      display:inline-flex;
      align-items:center;
      gap:4px;
      padding:3px 8px;
      border-radius:999px;
      background:rgba(148,163,184,0.16);
      font-size:11px;
      margin-right:4px;
    }
  </style>
</head>
<body>
  <div class="card">
    <button id="btnTheme" class="theme-toggle" type="button">
      <span class="icon" id="themeIcon">🌙</span>
      <span id="themeLabel">Dark</span>
    </button>

    <div class="logo-wrapper">
      <div class="logo-img">
        <img src="icons/icon-512.png" alt="SGO" />
      </div>
      <h1>SGO</h1>
      <div class="subtitle">Acesso ao sistema de gestão de operações</div>
    </div>

    <form id="formLogin">
      <label for="identificador">Matrícula, usuário ou e-mail</label>
      <input
        id="identificador"
        type="text"
        required
        placeholder="Ex: 00123 ou nome.sobrenome ou nome@empresa.com"
        autocomplete="username" />

      <label for="senha">Senha</label>
      <input
        id="senha"
        type="password"
        required
        placeholder="Sua senha"
        autocomplete="current-password" />

      <button id="btnEntrar" class="primary" type="submit">
        Entrar
      </button>

      <p class="small" style="margin-top:8px;">
        • Login aceita matrícula, nome de usuário (nome.sobrenome) ou e-mail institucional, conforme configurado pelo gestor.<br>
        • A senha inicial é fornecida pelo gestor e poderá ser alterada no painel do operador, após o primeiro acesso.
      </p>
    </form>

    <div id="msgErro" class="error" style="display:none"></div>
    <div id="msgOk" class="success" style="display:none"></div>

    <div class="divider"></div>

    <div id="areaPerfis" class="role-actions" style="display:none">
      <h2>Acessar painéis</h2>
      <p class="small" id="textoUsuario"></p>
      <div id="rolesBadges" style="margin-bottom:6px;"></div>

      <button id="btnIrOperador" class="secondary" type="button" style="display:none">
        Painel do Operador
      </button>
      <button id="btnIrGestor" class="secondary" type="button" style="display:none">
        Painel do Gestor
      </button>
    </div>
  </div>

<script>
  // ---------- Tema (mesma ideia do gestor, persistido por dispositivo) ----------
  const THEME_KEY = 'sgo_theme_login';
  const btnTheme  = document.getElementById('btnTheme');
  const themeIcon = document.getElementById('themeIcon');
  const themeLabel= document.getElementById('themeLabel');

  function aplicarTemaInicial() {
    let saved = null;
    try {
      saved = localStorage.getItem(THEME_KEY);
    } catch(e) {}

    if (saved === 'dark') {
      document.body.classList.add('theme-dark');
      themeIcon.textContent = '☀️';
      themeLabel.textContent = 'Light';
      document.querySelector('meta[name="theme-color"]').setAttribute('content', '#020826');
    } else if (saved === 'light') {
      document.body.classList.remove('theme-dark');
      themeIcon.textContent = '🌙';
      themeLabel.textContent = 'Dark';
      document.querySelector('meta[name="theme-color"]').setAttribute('content', '#f3f4f6');
    } else {
      // Se não houver preferência salva, pode usar preferência do sistema como base. [web:209][web:213][web:222]
      const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
      if (prefersDark) {
        document.body.classList.add('theme-dark');
        themeIcon.textContent = '☀️';
        themeLabel.textContent = 'Light';
        document.querySelector('meta[name="theme-color"]').setAttribute('content', '#020826');
      } else {
        document.body.classList.remove('theme-dark');
        themeIcon.textContent = '🌙';
        themeLabel.textContent = 'Dark';
        document.querySelector('meta[name="theme-color"]').setAttribute('content', '#f3f4f6');
      }
    }
  }

  aplicarTemaInicial();

  btnTheme.addEventListener('click', () => {
    const isDark = document.body.classList.toggle('theme-dark');
    try {
      localStorage.setItem(THEME_KEY, isDark ? 'dark' : 'light');
    } catch(e) {}
    if (isDark) {
      themeIcon.textContent = '☀️';
      themeLabel.textContent = 'Light';
      document.querySelector('meta[name="theme-color"]').setAttribute('content', '#020826');
    } else {
      themeIcon.textContent = '🌙';
      themeLabel.textContent = 'Dark';
      document.querySelector('meta[name="theme-color"]').setAttribute('content', '#f3f4f6');
    }
  });

  // ---------- Login ----------
  const API_LOGIN_URL = '/api/auth/login'; // ajustar na integração real

  const formLogin  = document.getElementById('formLogin');
  const btnEntrar  = document.getElementById('btnEntrar');
  const msgErro    = document.getElementById('msgErro');
  const msgOk      = document.getElementById('msgOk');
  const areaPerfis   = document.getElementById('areaPerfis');
  const textoUsuario = document.getElementById('textoUsuario');
  const rolesBadges  = document.getElementById('rolesBadges');
  const btnIrOperador = document.getElementById('btnIrOperador');
  const btnIrGestor   = document.getElementById('btnIrGestor');

  function limparMensagens() {
    msgErro.style.display = 'none';
    msgOk.style.display = 'none';
  }

  function mostrarErro(texto) {
    msgErro.textContent = texto;
    msgErro.style.display = 'block';
    msgOk.style.display = 'none';
  }

  function mostrarOk(texto) {
    msgOk.textContent = texto;
    msgOk.style.display = 'block';
    msgErro.style.display = 'none';
  }

  function popularPerfis(usuario) {
    areaPerfis.style.display = 'block';
    const ident = usuario.identificadorExibicao || usuario.email || usuario.username || usuario.matricula || '';
    textoUsuario.textContent = `Autenticado como ${usuario.nome}${ident ? ' (' + ident + ')' : ''}.`;
    rolesBadges.innerHTML = '';

    const roles = usuario.roles || [];
    roles.forEach(r => {
      const span = document.createElement('span');
      span.className = 'badge-role';
      span.textContent = r;
      rolesBadges.appendChild(span);
    });

    btnIrOperador.style.display = roles.includes('OPERADOR') ? 'inline-flex' : 'none';
    btnIrGestor.style.display   = roles.includes('GESTOR')   ? 'inline-flex' : 'none';
  }

  formLogin.addEventListener('submit', async (e) => {
    e.preventDefault();
    limparMensagens();

    const identificador = document.getElementById('identificador').value.trim();
    const senha         = document.getElementById('senha').value;

    if (!identificador || !senha) {
      mostrarErro('Informe o identificador (matrícula, usuário ou e-mail) e a senha.');
      return;
    }

    btnEntrar.disabled = true;
    btnEntrar.textContent = 'Validando...';

    try {
      const resp = await fetch(API_LOGIN_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ identificador, senha })
      });

      if (!resp.ok) {
        mostrarErro('Dados inválidos ou falha de comunicação. Confirme o identificador e a senha.');
        btnEntrar.disabled = false;
        btnEntrar.textContent = 'Entrar';
        return;
      }

      const data = await resp.json();

      if (!data || !data.usuario || !data.usuario.roles) {
        mostrarErro('Resposta inesperada do servidor. Fale com o suporte.');
        btnEntrar.disabled = false;
        btnEntrar.textContent = 'Entrar';
        return;
      }

      // Em produção, considere usar cookies HttpOnly para token; aqui mantemos simples. [web:178][web:183][web:194][web:204]
      localStorage.setItem('sgo_auth_token', data.token || '');
      localStorage.setItem('sgo_usuario', JSON.stringify(data.usuario));

      if (data.usuario.deveTrocarSenha) {
        mostrarOk('Login realizado. Por segurança, altere sua senha no painel do operador no primeiro acesso.');
      } else {
        mostrarOk('Login realizado com sucesso.');
      }

      popularPerfis(data.usuario);

      btnEntrar.disabled = false;
      btnEntrar.textContent = 'Entrar';
    } catch (err) {
      console.error(err);
      mostrarErro('Erro de rede ao tentar autenticar. Verifique sua conexão.');
      btnEntrar.disabled = false;
      btnEntrar.textContent = 'Entrar';
    }
  });

  btnIrOperador.addEventListener('click', () => {
    window.location.href = 'operador.html';
  });

  btnIrGestor.addEventListener('click', () => {
    window.location.href = 'gestor.html';
  });

  // Se já houver usuário salvo, reapresenta perfis.
  (function checkUsuarioLocal() {
    try {
      const raw = localStorage.getItem('sgo_usuario');
      if (!raw) return;
      const usuario = JSON.parse(raw);
      if (usuario && (usuario.email || usuario.username || usuario.matricula)) {
        popularPerfis(usuario);
      }
    } catch (e) {}
  })();
</script>
</body>
</html>
