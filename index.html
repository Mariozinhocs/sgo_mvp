<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#020826" />
  <title>SGO – Login</title>

  <link rel="icon" type="image/x-icon" href="icons/favicon.ico" />
  <link rel="icon" type="image/png" href="icons/icon-512.png" />

  <style>
    :root {
      --bg-body: #0f172a;
      --bg-card: #020617;
      --text-main: #e5e7eb;
      --text-secondary: #9ca3af;
      --primary: #22c55e;
      --border-subtle: #1f2937;
    }

    * { box-sizing: border-box; }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      background: radial-gradient(circle at top, #1d283a, #020617 58%);
      color: var(--text-main);
      min-height: 100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:16px;
    }

    .card {
      background: linear-gradient(145deg, #020617, #020617);
      border-radius: 18px;
      padding: 18px 18px 20px;
      border: 1px solid var(--border-subtle);
      box-shadow: 0 18px 40px rgba(15,23,42,0.85);
      max-width: 400px;
      width:100%;
    }

    h1 {
      margin: 0 0 6px;
      font-size: 20px;
    }

    .small {
      font-size: 12px;
      color: var(--text-secondary);
    }

    .label {
      font-size:11px;
      text-transform:uppercase;
      letter-spacing:0.06em;
      color:var(--text-secondary);
      margin-bottom:2px;
      margin-top:8px;
    }

    input {
      width:100%;
      padding:8px 10px;
      border-radius:10px;
      border:1px solid rgba(148,163,184,0.45);
      background:#020617;
      color:var(--text-main);
      font-size:13px;
    }

    input::placeholder {
      color:var(--text-secondary);
    }

    button {
      font: inherit;
      border-radius:999px;
      border:none;
      padding:9px 14px;
      cursor:pointer;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:6px;
    }

    button.primary {
      background:var(--primary);
      color:#022c22;
      font-weight:600;
      width:100%;
      margin-top:12px;
    }

    .feedback {
      font-size:11px;
      margin-top:8px;
      color:#fecaca;
    }

    .muted {
      font-size:11px;
      color:var(--text-secondary);
      margin-top:6px;
    }
  </style>
</head>
<body>
  <section class="card">
    <h1>SGO – Acesso</h1>
    <p class="small">
      Informe usuário e senha para acessar o painel (MVP com usuários de teste).
    </p>

    <div class="label">Usuário</div>
    <input id="inputUsuario" type="text" placeholder="ex: user.user, gestor.gestor, admin.admin" autocomplete="username" />

    <div class="label">Senha</div>
    <input id="inputSenha" type="password" placeholder="Senha" autocomplete="current-password" />

    <button id="btnEntrar" class="primary" type="button">
      Entrar
    </button>

    <p class="muted">
      Usuários de teste:
      <br>user.user / 123 (OPERADOR)
      <br>gestor.gestor / 123 (GESTOR)
      <br>admin.admin / 123 (ADMIN + GESTOR)
    </p>

    <p id="feedbackLogin" class="feedback"></p>
  </section>

<script>
  // Se já estiver logado, manda direto para operador.html (MVP)
  (function redirectIfLogged() {
    try {
      const token = localStorage.getItem('sgo_auth_token');
      const usuarioRaw = localStorage.getItem('sgo_usuario');
      if (!token || !usuarioRaw) return;
      // MVP: sempre operador
      window.location.href = 'operador.html';
    } catch (e) {
      // se der erro, segue no login
    }
  })();

  const inputUsuario = document.getElementById('inputUsuario');
  const inputSenha   = document.getElementById('inputSenha');
  const btnEntrar    = document.getElementById('btnEntrar');
  const feedback     = document.getElementById('feedbackLogin');

  // Mock de usuários conforme pedido: user, gestor, admin
  const mockUsuarios = [
    {
      username: 'user.user',
      senha: '123',
      nome: 'Operador User',
      matricula: '00001',
      roles: ['OPERADOR'],
      postoPrincipal: 'Centro de Cooperação da Cidade'
    },
    {
      username: 'gestor.gestor',
      senha: '123',
      nome: 'Gestor Demo',
      matricula: '90001',
      roles: ['GESTOR'],
      postoPrincipal: 'Centro de Cooperação da Cidade'
    },
    {
      username: 'admin.admin',
      senha: '123',
      nome: 'Admin Demo',
      matricula: '99999',
      roles: ['ADMIN', 'GESTOR'],
      postoPrincipal: 'Centro de Cooperação da Cidade'
    }
  ];

  function autenticarMock(user, senha) {
    return mockUsuarios.find(u => u.username === user && u.senha === senha) || null;
  }

  btnEntrar.addEventListener('click', () => {
    feedback.textContent = '';

    const user = inputUsuario.value.trim();
    const senha= inputSenha.value.trim();

    if (!user || !senha) {
      feedback.textContent = 'Informe usuário e senha.';
      return;
    }

    const encontrado = autenticarMock(user, senha);

    if (!encontrado) {
      feedback.textContent = 'Usuário ou senha inválidos (mock).';
      return;
    }

    // Salva token/usuário em localStorage
    try {
      localStorage.setItem('sgo_auth_token', 'mock-token-' + Date.now());
      localStorage.setItem('sgo_usuario', JSON.stringify({
        nome: encontrado.nome,
        username: encontrado.username,
        matricula: encontrado.matricula,
        roles: encontrado.roles,
        postoPrincipal: encontrado.postoPrincipal
      }));
    } catch (e) {
      // se falhar, ainda assim tentamos seguir
    }

    // Captura geolocalização logo após login e antes do redirect
    if (navigator.geolocation) {
      feedback.textContent = 'Capturando localização...';

      navigator.geolocation.getCurrentPosition(
        (pos) => {
          try {
            localStorage.setItem('sgo_geo_pos', JSON.stringify({
              lat: pos.coords.latitude,
              lng: pos.coords.longitude,
              ts: Date.now()
            }));
          } catch (e) {
            // se não conseguir salvar, segue mesmo assim
          }
          feedback.textContent = '';
          // MVP: sempre painel de operador
          window.location.href = 'operador.html';
        },
        (err) => {
          console.warn('Erro geolocalização após login:', err);
          // Mesmo que o usuário negue a permissão ou dê erro, segue
          feedback.textContent = '';
          window.location.href = 'operador.html';
        },
        { enableHighAccuracy: true, timeout: 10000 }
      );
    } else {
      // Se geolocalização não for suportada
      window.location.href = 'operador.html';
    }
  });

  // Enter para submeter
  inputSenha.addEventListener('keyup', (e) => {
    if (e.key === 'Enter') {
      btnEntrar.click();
    }
  });
</script>
</body>
</html>
