<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#020826" />
  <title>SGO – Login</title>

  <link rel="icon" type="image/x-icon" href="icons/favicon.ico" />
  <link rel="icon" type="image/png" href="icons/icon-512.png" />

  <style>
    :root {
      --bg-body: #0f172a;
      --bg-card: #020617;
      --text-main: #e5e7eb;
      --text-secondary: #9ca3af;
      --primary: #22c55e;
      --border-subtle: #1f2937;
    }

    body.theme-light {
      background: #f3f4f6;
      color: #020617;
    }

    body.theme-light .card {
      background: #ffffff;
      border-color: #d1d5db;
      box-shadow: 0 10px 25px rgba(15,23,42,0.12);
    }

    body.theme-light input {
      background:#ffffff;
      color:#020617;
      border-color:#d1d5db;
    }

    body.theme-light .logo-img {
      background:#f9fafb;
      border-color:#d1d5db;
    }

    * { box-sizing: border-box; }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      background: radial-gradient(circle at top, #1d283a, #020617 58%);
      color: var(--text-main);
      min-height: 100vh;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:flex-start;
      padding:16px;
    }

    header {
      width:100%;
      max-width:400px;
      padding: 0 0 8px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
    }

    .header-left {
      display:flex;
      flex-direction:column;
      gap:4px;
    }

    .logo-box {
      display:flex;
      align-items:center;
      gap:10px;
    }

    .logo-img {
      width:54px;
      height:54px;
      border-radius:12px;
      object-fit:contain;
      background:#020617;
      border:1px solid rgba(148,163,184,0.5);
      padding:6px;
    }

    .logo-text {
      display:flex;
      flex-direction:column;
    }

    .logo-title {
      font-size:16px;
      font-weight:600;
    }

    .logo-subtitle {
      font-size:11px;
      color:var(--text-secondary);
    }

    .subtitle-header {
      font-size:11px;
      color:var(--text-secondary);
    }

    .header-right {
      display:flex;
      align-items:center;
      gap:8px;
    }

    .theme-toggle {
      font-size: 13px;
      padding: 4px 9px;
      border-radius: 999px;
      border: 1px solid rgba(148,163,184,0.6);
      background: rgba(15,23,42,0.9);
      color: #e5e7eb;
      display:inline-flex;
      align-items:center;
      gap:6px;
      cursor:pointer;
    }

    .theme-toggle span.icon {
      font-size:15px;
    }

    body.theme-light .theme-toggle {
      background:#e5e7eb;
      color:#020617;
      border-color:#9ca3af;
    }

    .card {
      background: linear-gradient(145deg, #020617, #020617);
      border-radius: 18px;
      padding: 18px 18px 20px;
      border: 1px solid var(--border-subtle);
      box-shadow: 0 18px 40px rgba(15,23,42,0.85);
      max-width: 400px;
      width:100%;
    }

    h1 {
      margin: 0 0 6px;
      font-size: 20px;
    }

    .small {
      font-size: 12px;
      color: var(--text-secondary);
    }

    .label {
      font-size:11px;
      text-transform:uppercase;
      letter-spacing:0.06em;
      color:var(--text-secondary);
      margin-bottom:2px;
      margin-top:8px;
    }

    input {
      width:100%;
      padding:8px 10px;
      border-radius:10px;
      border:1px solid rgba(148,163,184,0.45);
      background:#020617;
      color:var(--text-main);
      font-size:13px;
    }

    input::placeholder {
      color:var(--text-secondary);
    }

    button {
      font: inherit;
      border-radius:999px;
      border:none;
      padding:9px 14px;
      cursor:pointer;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:6px;
    }

    button.primary {
      background:var(--primary);
      color:#022c22;
      font-weight:600;
      width:100%;
      margin-top:12px;
    }

    .feedback {
      font-size:11px;
      margin-top:8px;
      color:#fecaca;
    }

    .muted {
      font-size:11px;
      color:var(--text-secondary);
      margin-top:6px;
    }
  </style>
</head>
<body>
  <header>
    <div class="header-left">
      <div class="logo-box">
        <img src="icons/icon-512.png" alt="Logo SGO" class="logo-img">
        <div class="logo-text">
          <span class="logo-title">SGO</span>
          <span class="logo-subtitle">Sistema de Gestão de Operações</span>
        </div>
      </div>
      <div class="subtitle-header">
        Acesso ao sistema (MVP)
      </div>
    </div>
    <div class="header-right">
      <button id="btnTheme" class="theme-toggle" type="button">
        <span class="icon" id="themeIcon">☀️</span>
        <span id="themeLabel">Light</span>
      </button>
    </div>
  </header>

  <section class="card">
    <h1>Login</h1>
    <p class="small">
      Informe usuário e senha para acessar o painel (MVP com usuários de teste).
    </p>

    <div class="label">Usuário</div>
    <input id="inputUsuario" type="text" placeholder="ex: user.user, gestor.gestor, admin.admin" autocomplete="username" />

    <div class="label">Senha</div>
    <input id="inputSenha" type="password" placeholder="Senha" autocomplete="current-password" />

    <button id="btnEntrar" class="primary" type="button">
      Entrar
    </button>

    <p class="muted">
      Usuários de teste:
      <br>user.user / 123 (OPERADOR)
      <br>gestor.gestor / 123 (GESTOR)
      <br>admin.admin / 123 (ADMIN + GESTOR)
    </p>

    <p id="feedbackLogin" class="feedback"></p>
  </section>

<script>
  const THEME_KEY = 'sgo_theme_login';

  const btnTheme  = document.getElementById('btnTheme');
  const themeIcon = document.getElementById('themeIcon');
  const themeLabel= document.getElementById('themeLabel');

  function aplicarTemaInicial() {
    let saved = null;
    try { saved = localStorage.getItem(THEME_KEY); } catch(e) {}

    if (saved === 'light') {
      document.body.classList.add('theme-light');
      themeIcon.textContent = '🌙';
      themeLabel.textContent = 'Dark';
      document.querySelector('meta[name="theme-color"]').setAttribute('content', '#f3f4f6');
    } else {
      document.body.classList.remove('theme-light');
      themeIcon.textContent = '☀️';
      themeLabel.textContent = 'Light';
      document.querySelector('meta[name="theme-color"]').setAttribute('content', '#020826');
    }
  }

  aplicarTemaInicial();

  btnTheme.addEventListener('click', () => {
    const isLight = document.body.classList.toggle('theme-light');
    try { localStorage.setItem(THEME_KEY, isLight ? 'light' : 'dark'); } catch(e) {}
    if (isLight) {
      themeIcon.textContent = '🌙';
      themeLabel.textContent = 'Dark';
      document.querySelector('meta[name="theme-color"]').setAttribute('content', '#f3f4f6');
    } else {
      themeIcon.textContent = '☀️';
      themeLabel.textContent = 'Light';
      document.querySelector('meta[name="theme-color"]').setAttribute('content', '#020826');
    }
  });

  // auto-login: sempre para operador.html
  (function redirectIfLogged() {
    try {
      const token = localStorage.getItem('sgo_auth_token');
      const usuarioRaw = localStorage.getItem('sgo_usuario');
      if (!token || !usuarioRaw) return;
      window.location.href = 'operador.html';
    } catch (e) {}
  })();

  const inputUsuario = document.getElementById('inputUsuario');
  const inputSenha   = document.getElementById('inputSenha');
  const btnEntrar    = document.getElementById('btnEntrar');
  const feedback     = document.getElementById('feedbackLogin');

  const mockUsuarios = [
    { username: 'user.user',   senha: '123', nome: 'User User',   matricula: '00001', roles: ['OPERADOR'],        postoPrincipal: 'Centro de Cooperação da Cidade' },
    { username: 'gestor.gestor', senha: '123', nome: 'Gestor Gestor', matricula: '90001', roles: ['GESTOR'],      postoPrincipal: 'Centro de Cooperação da Cidade' },
    { username: 'admin.admin', senha: '123', nome: 'Admin Admin', matricula: '99999', roles: ['ADMIN','GESTOR'], postoPrincipal: 'Centro de Cooperação da Cidade' }
  ];

  function autenticarMock(user, senha) {
    return mockUsuarios.find(u => u.username === user && u.senha === senha) || null;
  }

  btnEntrar.addEventListener('click', () => {
    feedback.textContent = '';

    const user = inputUsuario.value.trim();
    const senha= inputSenha.value.trim();

    if (!user || !senha) {
      feedback.textContent = 'Informe usuário e senha.';
      return;
    }

    const encontrado = autenticarMock(user, senha);

    if (!encontrado) {
      feedback.textContent = 'Usuário ou senha inválidos (mock).';
      return;
    }

    try {
      localStorage.setItem('sgo_auth_token', 'mock-token-' + Date.now());
      localStorage.setItem('sgo_usuario', JSON.stringify({
        nome: encontrado.nome,
        username: encontrado.username,
        matricula: encontrado.matricula,
        roles: encontrado.roles,
        postoPrincipal: encontrado.postoPrincipal
      }));
    } catch (e) {}

    if (navigator.geolocation) {
      feedback.textContent = 'Capturando localização...';

      navigator.geolocation.getCurrentPosition(
        (pos) => {
          try {
            localStorage.setItem('sgo_geo_pos', JSON.stringify({
              lat: pos.coords.latitude,
              lng: pos.coords.longitude,
              ts: Date.now()
            }));
          } catch (e) {}
          feedback.textContent = '';
          window.location.href = 'operador.html';
        },
        () => {
          feedback.textContent = '';
          window.location.href = 'operador.html';
        },
        { enableHighAccuracy: true, timeout: 10000 }
      );
    } else {
      window.location.href = 'operador.html';
    }
  });

  inputSenha.addEventListener('keyup', (e) => {
    if (e.key === 'Enter') {
      btnEntrar.click();
    }
  });
</script>
</body>
</html>
