<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#020826" />
  <title>SGO – Gestor</title>

  <link rel="icon" type="image/x-icon" href="icons/favicon.ico" />
  <link rel="icon" type="image/png" href="icons/icon-512.png" />

  <style>
    :root {
      --bg-body: #0f172a;
      --bg-card: #020617;
      --text-main: #e5e7eb;
      --text-secondary: #9ca3af;
      --primary: #22c55e;
      --border-subtle: #1f2937;
    }

    body.theme-light {
      background: #f3f4f6;
      color: #020617;
    }

    body.theme-light .card {
      background:#ffffff;
      border-color:#d1d5db;
      box-shadow:0 10px 25px rgba(15,23,42,0.12);
    }

    body.theme-light .logo-img {
      background:#f9fafb;
      border-color:#d1d5db;
    }

    * { box-sizing: border-box; }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin:0;
      background: radial-gradient(circle at top, #1d283a, #020617 58%);
      color:var(--text-main);
      min-height:100vh;
    }

    header {
      padding:14px 14px 6px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      max-width:960px;
      margin:0 auto;
    }

    .header-left {
      display:flex;
      flex-direction:column;
      gap:4px;
    }

    .logo-box {
      display:flex;
      align-items:center;
      gap:10px;
    }

    .logo-img {
      width:54px;
      height:54px;
      border-radius:12px;
      object-fit:contain;
      background:#020617;
      border:1px solid rgba(148,163,184,0.5);
      padding:6px;
    }

    .logo-text {
      display:flex;
      flex-direction:column;
    }

    .logo-title {
      font-size:16px;
      font-weight:600;
    }

    .logo-subtitle {
      font-size:11px;
      color:var(--text-secondary);
    }

    .subtitle-header {
      font-size:11px;
      color:var(--text-secondary);
    }

    .header-right {
      display:flex;
      align-items:center;
      gap:8px;
    }

    .theme-toggle {
      font-size: 13px;
      padding: 4px 9px;
      border-radius: 999px;
      border: 1px solid rgba(148,163,184,0.6);
      background: rgba(15,23,42,0.9);
      color: #e5e7eb;
      display:inline-flex;
      align-items:center;
      gap:6px;
      cursor:pointer;
    }

    .theme-toggle span.icon {
      font-size:15px;
    }

    body.theme-light .theme-toggle {
      background:#e5e7eb;
      color:#020617;
      border-color:#9ca3af;
    }

    .btn-exit {
      font-size: 13px;
      border-radius: 999px;
      border: 1px solid rgba(248,113,113,0.6);
      padding: 6px 10px;
      background: rgba(127,29,29,0.9);
      color: #fee2e2;
      display:inline-flex;
      align-items:center;
      gap:6px;
      cursor:pointer;
      white-space:nowrap;
    }

    .btn-exit span {
      font-size:15px;
    }

    main {
      padding: 8px 14px 24px;
      max-width:960px;
      margin:0 auto;
    }

    .card {
      background: linear-gradient(145deg, #020617, #020617);
      border-radius: 18px;
      padding: 14px 14px 16px;
      border: 1px solid var(--border-subtle);
      box-shadow: 0 18px 40px rgba(15,23,42,0.85);
      margin-bottom: 14px;
    }

    h2 {
      margin: 0 0 6px;
      font-size: 17px;
    }

    .small {
      font-size: 12px;
      color: var(--text-secondary);
    }
  </style>
</head>
<body>
<header>
  <div class="header-left">
    <div class="logo-box">
      <img src="icons/icon-512.png" alt="Logo SGO" class="logo-img">
      <div class="logo-text">
        <span class="logo-title">SGO</span>
        <span class="logo-subtitle">Painel do Gestor</span>
      </div>
    </div>
    <div class="subtitle-header" id="subtitleGestor">
      Gestor logado
    </div>
  </div>
  <div class="header-right">
    <button id="btnTheme" class="theme-toggle" type="button">
      <span class="icon" id="themeIcon">☀️</span>
      <span id="themeLabel">Light</span>
    </button>
    <button class="btn-exit" type="button" id="btnVoltarOperador">
      <span>←</span>
      Voltar ao operador
    </button>
  </div>
</header>

<main>
  <section class="card">
    <h2>Painel do Gestor</h2>
    <p class="small">
      Aqui o gestor irá configurar escalas, visualizar indicadores e acompanhar o time (MVP em construção).
    </p>
  </section>
</main>

<script>
  const THEME_KEY = 'sgo_theme_login';

  const btnTheme  = document.getElementById('btnTheme');
  const themeIcon = document.getElementById('themeIcon');
  const themeLabel= document.getElementById('themeLabel');

  function aplicarTemaInicial() {
    let saved = null;
    try { saved = localStorage.getItem(THEME_KEY); } catch(e) {}

    if (saved === 'light') {
      document.body.classList.add('theme-light');
      themeIcon.textContent = '🌙';
      themeLabel.textContent = 'Dark';
      document.querySelector('meta[name="theme-color"]').setAttribute('content', '#f3f4f6');
    } else {
      document.body.classList.remove('theme-light');
      themeIcon.textContent = '☀️';
      themeLabel.textContent = 'Light';
      document.querySelector('meta[name="theme-color"]').setAttribute('content', '#020826');
    }
  }

  aplicarTemaInicial();

  btnTheme.addEventListener('click', () => {
    const isLight = document.body.classList.toggle('theme-light');
    try { localStorage.setItem(THEME_KEY, isLight ? 'light' : 'dark'); } catch(e) {}
    if (isLight) {
      themeIcon.textContent = '🌙';
      themeLabel.textContent = 'Dark';
      document.querySelector('meta[name="theme-color"]').setAttribute('content', '#f3f4f6');
    } else {
      themeIcon.textContent = '☀️';
      themeLabel.textContent = 'Light';
      document.querySelector('meta[name="theme-color"]').setAttribute('content', '#020826');
    }
  });

  // proteção de acesso: só gestor/admin
  function carregarUsuario() {
    try {
      const raw = localStorage.getItem('sgo_usuario');
      if (!raw) return null;
      return JSON.parse(raw);
    } catch(e) { return null; }
  }

  const usuario = carregarUsuario();
  if (!usuario) {
    window.location.href = 'index.html';
  } else {
    const roles = usuario.roles || [];
    const temGestor = roles.includes('GESTOR') || roles.includes('ADMIN');

    if (!temGestor) {
      // não é gestor/admin: volta para painel principal de operador
      window.location.href = 'operador.html';
    } else {
      const nome = usuario.nome || usuario.username || 'Gestor';
      document.getElementById('subtitleGestor').textContent =
        `Gestor logado – ${nome}`;
    }
  }

  document.getElementById('btnVoltarOperador').addEventListener('click', () => {
    window.location.href = 'operador.html';
  });
</script>
</body>
</html>
