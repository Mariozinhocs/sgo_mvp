<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#020826" />
  <title>SGO – Operador</title>

  <link rel="icon" type="image/x-icon" href="icons/favicon.ico" />
  <link rel="icon" type="image/png" href="icons/icon-512.png" />

  <style>
    :root {
      --bg-body: #0f172a;
      --bg-card: #020617;
      --text-main: #e5e7eb;
      --text-secondary: #9ca3af;
      --primary: #22c55e;
      --primary-soft: rgba(34,197,94,0.12);
      --danger: #ef4444;
      --danger-soft: rgba(248,113,113,0.12);
      --border-subtle: #1f2937;
      --input-light: #e5e7eb;
      --input-light-border: #d1d5db;
      --button-inactive-light: #e5e7eb;
      --button-inactive-dark: #111827;
    }

    body.theme-light {
      background: #f3f4f6;
      color: #020617;
    }

    body.theme-light .card {
      background: #ffffff;
      border-color: #d1d5db;
      box-shadow: 0 10px 25px rgba(15,23,42,0.12);
    }

    body.theme-light .logo-img {
      background:#f9fafb;
      border-color:#d1d5db;
    }

    body.theme-light .info-box,
    body.theme-light .escala-box {
      background:#f9fafb;
      border-color:#d1d5db;
    }

    body.theme-light input,
    body.theme-light select {
      background: var(--input-light);
      color: #020617;
      border-color: var(--input-light-border);
    }

    * { box-sizing: border-box; }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      background: radial-gradient(circle at top, #1d283a, #020617 58%);
      color: var(--text-main);
      min-height: 100vh;
    }

    header {
      padding: 14px 14px 6px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      max-width:820px;
      margin:0 auto;
    }

    .header-left {
      display:flex;
      flex-direction:column;
      gap:4px;
    }

    .logo-box {
      display:flex;
      align-items:center;
      gap:10px;
    }

    .logo-img {
      width:54px;
      height:54px;
      border-radius:12px;
      object-fit:contain;
      background:#020617;
      border:1px solid rgba(148,163,184,0.5);
      padding:6px;
    }

    .logo-text {
      display:flex;
      flex-direction:column;
    }

    .logo-title {
      font-size:16px;
      font-weight:600;
    }

    .logo-subtitle {
      font-size:11px;
      color:var(--text-secondary);
    }

    .subtitle-header {
      font-size:11px;
      color:var(--text-secondary);
    }

    .header-right {
      display:flex;
      align-items:center;
      gap:8px;
    }

    .theme-toggle {
      font-size: 13px;
      padding: 4px 9px;
      border-radius: 999px;
      border: 1px solid rgba(148,163,184,0.6);
      background: rgba(15,23,42,0.9);
      color: #e5e7eb;
      display:inline-flex;
      align-items:center;
      gap:6px;
      cursor:pointer;
    }

    .theme-toggle span.icon {
      font-size:15px;
    }

    body.theme-light .theme-toggle {
      background:#e5e7eb;
      color:#020617;
      border-color:#9ca3af;
    }

    .btn-exit {
      font-size: 13px;
      border-radius: 999px;
      border: 1px solid rgba(248,113,113,0.6);
      padding: 6px 10px;
      background: rgba(127,29,29,0.9);
      color: #fee2e2;
      display:inline-flex;
      align-items:center;
      gap:6px;
      cursor:pointer;
      white-space:nowrap;
    }

    .btn-exit span {
      font-size:15px;
    }

    main {
      padding: 8px 14px 24px;
      max-width: 820px;
      margin: 0 auto;
    }

    .tabs-header {
      display:flex;
      gap:6px;
      margin: 4px 0 10px;
      flex-wrap:wrap;
    }

    .tab-button {
      flex:1;
      text-align:center;
      padding:8px 8px;
      border-radius:999px;
      border:1px solid rgba(148,163,184,0.4);
      background:rgba(15,23,42,0.85);
      color:var(--text-secondary);
      font-size:12px;
      cursor:pointer;
    }

    .tab-button.active {
      background:var(--primary);
      border-color:var(--primary);
      color:#022c22;
      font-weight:600;
    }

    .tab-panel {
      display:none;
    }

    .tab-panel.active {
      display:block;
    }

    .card {
      background: linear-gradient(145deg, #020617, #020617);
      border-radius: 18px;
      padding: 14px 14px 16px;
      border: 1px solid var(--border-subtle);
      box-shadow: 0 18px 40px rgba(15,23,42,0.85);
      margin-bottom: 14px;
    }

    h2 {
      margin: 0 0 6px;
      font-size: 17px;
    }

    .small {
      font-size: 12px;
      color: var(--text-secondary);
    }

    .info-box {
      margin-top:8px;
      padding:8px 10px;
      border-radius:10px;
      border:1px solid var(--border-subtle);
      background:rgba(15,23,42,0.8);
      font-size:12px;
    }

    .info-label {
      text-transform:uppercase;
      font-size:11px;
      letter-spacing:0.06em;
      color:var(--text-secondary);
    }

    .info-value {
      margin-top:2px;
      font-size:13px;
    }

    .row {
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }

    button {
      font: inherit;
      border-radius: 999px;
      border: none;
      padding: 8px 14px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    button.primary {
      background: var(--primary);
      color: #022c22;
      font-weight: 600;
    }

    button.secondary {
      background: var(--button-inactive-dark);
      color: var(--text-main);
      border: 1px solid rgba(148,163,184,0.4);
    }

    body.theme-light button.secondary {
      background: var(--button-inactive-light);
      color: #111827;
      border-color: #cbd5f5;
    }

    button:disabled {
      opacity:0.7;
      cursor:not-allowed;
    }

    .status-badge {
      display:inline-flex;
      align-items:center;
      padding:2px 8px;
      border-radius:999px;
      font-size:11px;
      border:1px solid rgba(148,163,184,0.5);
      color:var(--text-secondary);
      gap:4px;
    }

    .status-badge.ativo {
      border-color:rgba(34,197,94,0.8);
      color:#bbf7d0;
      background:var(--primary-soft);
    }

    .status-badge.off {
      border-color:rgba(248,113,113,0.8);
      color:#fecaca;
      background:var(--danger-soft);
    }

    .perfil-grid {
      display:flex;
      gap:14px;
      flex-wrap:wrap;
      align-items:flex-start;
    }

    .perfil-foto {
      width:90px;
      height:90px;
      border-radius:999px;
      border:2px solid rgba(148,163,184,0.6);
      background:#020617;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:32px;
      font-weight:600;
      color:var(--text-secondary);
      overflow:hidden;
    }

    .perfil-foto img {
      width:100%;
      height:100%;
      object-fit:cover;
    }

    .perfil-dados {
      flex:1;
      min-width:200px;
    }

    .perfil-campo {
      margin-top:4px;
      font-size:13px;
    }

    .perfil-campo span.label {
      font-size:11px;
      text-transform:uppercase;
      letter-spacing:0.06em;
      color:var(--text-secondary);
      display:block;
    }

    .perfil-campo span.valor {
      font-size:13px;
    }

    .label-inline {
      font-size:11px;
      text-transform:uppercase;
      letter-spacing:0.06em;
      color:var(--text-secondary);
      margin-top:8px;
      margin-bottom:2px;
    }

    input.perfil-input, input.senha-input {
      width:100%;
      padding:7px 9px;
      border-radius:10px;
      border:1px solid rgba(148,163,184,0.45);
      background:#020617;
      color:var(--text-main);
      font-size:13px;
    }

    .escala-header {
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
      margin-top:6px;
      flex-wrap:wrap;
    }

    .escala-selects {
      display:flex;
      gap:6px;
      flex-wrap:wrap;
    }

    .escala-selects select {
      padding:4px 8px;
      border-radius:999px;
      border:1px solid rgba(148,163,184,0.5);
      background:#020617;
      color:var(--text-main);
      font-size:12px;
    }

    .escala-box {
      margin-top:8px;
      padding:8px 10px;
      border-radius:10px;
      border:1px solid var(--border-subtle);
      background:rgba(15,23,42,0.8);
      font-size:12px;
      overflow-x:auto;
    }

    table.escala {
      width:100%;
      border-collapse:collapse;
      font-size:12px;
    }

    table.escala th,
    table.escala td {
      padding:4px 3px;
      border-bottom:1px solid rgba(31,41,55,0.9);
      text-align:center;
      white-space:nowrap;
    }

    table.escala th {
      font-size:11px;
      text-transform:uppercase;
      letter-spacing:0.06em;
      color:var(--text-secondary);
    }

    table.escala input[type="checkbox"] {
      width:14px;
      height:14px;
      accent-color:#22c55e;
      cursor:pointer;
    }

    .link-escala-anterior {
      margin-top:8px;
      font-size:12px;
      color:#a5b4fc;
      cursor:pointer;
      text-decoration:underline;
    }

    .lista-escalas-anteriores {
      margin-top:6px;
      font-size:12px;
    }

    .lista-escalas-anteriores li {
      margin-bottom:2px;
    }
  </style>
</head>
<body>
<header>
  <div class="header-left">
    <div class="logo-box">
      <img src="icons/icon-512.png" alt="Logo SGO" class="logo-img">
      <div class="logo-text">
        <span class="logo-title">SGO</span>
        <span class="logo-subtitle">Sistema de Gestão de Operações</span>
      </div>
    </div>
    <div class="subtitle-header" id="subtitleOperador">
      Operador logado
    </div>
  </div>
  <div class="header-right">
    <button id="btnTheme" class="theme-toggle" type="button">
      <span class="icon" id="themeIcon">☀️</span>
      <span id="themeLabel">Light</span>
    </button>
    <!-- botão para acessar painel do gestor, só aparece para roles GESTOR/ADMIN -->
    <button id="btnPainelGestor" class="secondary" type="button" style="display:none;">
      Painel do gestor
    </button>
    <button class="btn-exit" type="button" id="btnSair">
      <span>⏏</span>
      Sair
    </button>
  </div>
</header>

<!-- resto igual ao operador.html que te passei na mensagem anterior,
     incluindo abas Perfil, Ponto, Escala, Mensagens e todos os scripts,
     apenas acrescentando a lógica abaixo para o btnPainelGestor -->

<script>
  // ... (todo o script já enviado antes permanece igual) ...

  // após carregar o usuário no operador:
  function carregarUsuario() {
    try {
      const raw = localStorage.getItem('sgo_usuario');
      if (!raw) return null;
      return JSON.parse(raw);
    } catch(e) { return null; }
  }

  const usuario = carregarUsuario();
  if (!usuario) {
    window.location.href = 'index.html';
  } else {
    const roles = usuario.roles || [];
    const temGestor = roles.includes('GESTOR') || roles.includes('ADMIN');

    const btnPainelGestor = document.getElementById('btnPainelGestor');
    if (btnPainelGestor) {
      if (temGestor) {
        btnPainelGestor.style.display = 'inline-flex';
        btnPainelGestor.addEventListener('click', () => {
          window.location.href = 'gestor.html';
        });
      } else {
        btnPainelGestor.style.display = 'none';
      }
    }

    // (resto do preenchimento de nome, matrícula, etc. permanece)
  }
</script>
</body>
</html>
